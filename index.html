<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Screen Print Quote Generator</title>

<style>
body{font-family:Arial;background:#f4f4f4;padding:40px}
.wrapper{max-width:900px;margin:auto;background:#fff;padding:30px;border-radius:12px}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:20px}
.printGrid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:20px}
input,select{width:100%;padding:10px}
button{width:100%;padding:14px;margin-top:20px;background:#000;color:#fff;border:none}
</style>
</head>

<body>

<div class="wrapper">
<h2>Screen Print Quote Generator</h2>

<div class="grid">
<div><label>Order Qty</label><input id="qty"></div>
<div><label>Markup %</label><input id="markup" value="50"></div>
<div><label>Shirt Cost</label><input id="shirtCost" value="4"></div>
<div><label>Shirt Markup</label><input id="shirtMarkup" value="2"></div>
</div>

<div class="printGrid">
<div><label>Front Colors</label><select id="front"></select></div>
<div><label>Back Colors</label><select id="back"></select></div>
<div><label>Left Sleeve</label><select id="left"></select></div>
<div><label>Right Sleeve</label><select id="right"></select></div>
</div>

<button onclick="calc()">Generate Quote</button>

<div id="result"></div>
</div>

<script>
["front","back","left","right"].forEach(id=>{
  const s=document.getElementById(id);
  for(let i=0;i<=6;i++){
    const opt=document.createElement("option");
    opt.value=i;
    opt.textContent=i+" colors";
    s.appendChild(opt);
  }
});

function calc(){
const qty=+document.getElementById("qty").value||0;
const markup=+document.getElementById("markup").value||0;
const shirtCost=+document.getElementById("shirtCost").value||0;

if(qty<50){alert("Minimum order is 50");return;}

const printCost=2.6*qty;
const jobCost=printCost+(shirtCost*qty);
const retail=jobCost*(1+markup/100);

document.getElementById("result").innerHTML=
"<h3>Customer Total: $"+retail.toFixed(2)+"</h3>";
}
</script>

</body>
</html>
