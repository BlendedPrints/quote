<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>2026 Screen Print Pricing</title>

<style>
body{font-family:Arial;background:#f4f4f4;padding:40px}
.wrapper{max-width:1100px;margin:auto;background:#fff;padding:35px;border-radius:14px}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:20px}
.printGrid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:20px}
.twoCol{display:grid;grid-template-columns:1fr 1fr;gap:40px}
input,select{width:100%;padding:10px;border:1px solid #ccc;border-radius:6px}
button{width:100%;padding:14px;margin-top:20px;background:#000;color:#fff;border:none}
.section{margin-top:30px}
.red{color:#cc0000;font-weight:bold}
.green{color:#1b8f2a;font-weight:bold}
.targetBox{background:#f7f7f7;padding:20px;border-radius:10px;border:1px solid #ddd}

@media print{
 body{padding:10px;font-size:11px}
 button{display:none}
}
</style>
</head>

<body>
<div class="wrapper">
<h1>2026 Screen Print Pricing</h1>

<div class="grid">
<div><label>Order Qty</label><input id="qty" type="number"></div>
<div><label>Job Markup %</label><input id="markup" type="number" value="50"></div>
<div><label>Shirt Cost</label><input id="shirtCost" type="number" value="4"></div>
<div><label>Shirt Markup ($)</label><input id="shirtMarkup" type="number" value="2"></div>
</div>

<div class="printGrid">
<div><label>Front Colors</label><select id="front"></select></div>
<div><label>Back Colors</label><select id="back"></select></div>
<div><label>Left Sleeve Colors</label><select id="left"></select></div>
<div><label>Right Sleeve Colors</label><select id="right"></select></div>
</div>

<button onclick="generate()">Generate Quote</button>
<div id="report"></div>
</div>

<script>

// dropdown populate
["front","back","left","right"].forEach(id=>{
 const s=document.getElementById(id);
 for(let i=0;i<=6;i++){
   const opt=document.createElement("option");
   opt.value=i;
   opt.textContent=i+" colors";
   s.appendChild(opt);
 }
});

let storedJobCost=0;
let storedQty=0;
let storedPricePerShirt=0;

function generate(){

const qty=parseFloat(qtyInput.value)||0;
const markupPct=parseFloat(markup.value)||0;
const shirtCost=parseFloat(shirtCostInput.value)||0;
const shirtMarkup=parseFloat(shirtMarkupInput.value)||0;

if(qty<50){alert("Minimum order is 50");return;}

const f=parseInt(front.value);
const b=parseInt(back.value);
const l=parseInt(left.value);
const r=parseInt(right.value);

const markup=markupPct/100;
const pricePerPrint=2.6;
const screenFee=22;

// PER LOCATION CALCULATIONS
const frontCost=f*pricePerPrint*qty;
const backCost=b*pricePerPrint*qty;
const leftCost=l*pricePerPrint*qty;
const rightCost=r*pricePerPrint*qty;

const frontProfit=frontCost*markup;
const backProfit=backCost*markup;
const leftProfit=leftCost*markup;
const rightProfit=rightCost*markup;

const frontScreens=f*screenFee;
const backScreens=b*screenFee;
const leftScreens=l*screenFee;
const rightScreens=r*screenFee;

const totalPrintCost=frontCost+backCost+leftCost+rightCost;
const totalPrintProfit=frontProfit+backProfit+leftProfit+rightProfit;
const totalScreenFees=frontScreens+backScreens+leftScreens+rightScreens;

const garmentCost=shirtCost*qty;
const garmentSell=(shirtCost+shirtMarkup)*qty;
const garmentProfit=shirtMarkup*qty;

const jobCost=garmentCost+totalPrintCost;
const retail=jobCost*(1+markup);
const pricePerShirt=retail/qty;
const totalProfit=retail-jobCost;

storedJobCost=jobCost;
storedQty=qty;
storedPricePerShirt=pricePerShirt;

document.getElementById("report").innerHTML=`
<div class="section">
<h2>PRE-PRINTED GARMENTS</h2>
Blank Shirt Cost: <span class="red">$${shirtCost.toFixed(2)}</span><br>
Customer Shirt Price: <b>$${(shirtCost+shirtMarkup).toFixed(2)}</b><br>
Total Garment Cost: <span class="red">$${garmentCost.toFixed(2)}</span><br>
Garment Retail Total: <b>$${garmentSell.toFixed(2)}</b><br>
Garment Profit: <span class="green">$${garmentProfit.toFixed(2)}</span>
</div>

<div class="section">
<h2>PRINT PRODUCTION</h2>
Front (${f} colors): <span class="red">$${frontCost.toFixed(2)}</span> | Profit: <span class="green">$${frontProfit.toFixed(2)}</span> | Screen Fees: <span class="red">$${frontScreens.toFixed(2)}</span><br>
Back (${b} colors): <span class="red">$${backCost.toFixed(2)}</span> | Profit: <span class="green">$${backProfit.toFixed(2)}</span> | Screen Fees: <span class="red">$${backScreens.toFixed(2)}</span><br>
Left Sleeve (${l} colors): <span class="red">$${leftCost.toFixed(2)}</span> | Profit: <span class="green">$${leftProfit.toFixed(2)}</span> | Screen Fees: <span class="red">$${leftScreens.toFixed(2)}</span><br>
Right Sleeve (${r} colors): <span class="red">$${rightCost.toFixed(2)}</span> | Profit: <span class="green">$${rightProfit.toFixed(2)}</span> | Screen Fees: <span class="red">$${rightScreens.toFixed(2)}</span><br>
<br>
Total Screen Fees: <span class="red">$${totalScreenFees.toFixed(2)}</span><br>
Total Print Cost: <span class="red">$${totalPrintCost.toFixed(2)}</span><br>
Total Print Profit: <span class="green">$${totalPrintProfit.toFixed(2)}</span>
</div>

<div class="section twoCol">
<div>
<h2>CUSTOMER PRICING</h2>
Customer Price Per Shirt: <b>$${pricePerShirt.toFixed(2)}</b><br>
Customer Invoice Total: <b>$${retail.toFixed(2)}</b>
</div>

<div class="targetBox">
<h2>Customer Target Scenario</h2>
<input id="targetInput" type="number" placeholder="Target price per shirt" oninput="calcTarget()">
<div id="targetResults"></div>
</div>
</div>

<div class="section">
<h2>JOB PROFIT</h2>
Total Profit: <span class="green">$${totalProfit.toFixed(2)}</span>
</div>

<br><button onclick="window.print()">Print Quote</button>
`;
}

function calcTarget(){
const target=parseFloat(document.getElementById("targetInput").value)||0;
if(target===0) return;
const targetTotal=target*storedQty;
const targetProfit=targetTotal-storedJobCost;
const savings=storedPricePerShirt-target;

document.getElementById("targetResults").innerHTML=`
Target Job Total: $${targetTotal.toFixed(2)}<br>
Total Profit: <span class="${targetProfit>=0?'green':'red'}">$${targetProfit.toFixed(2)}</span><br>
Savings Per Shirt: $${savings.toFixed(2)}
`;
}
</script>
</body>
</html>
