<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>2026 Screen Print Pricing</title>

<style>
body{
  font-family:Arial;
  background:#f4f4f4;
  padding:40px;
}

.wrapper{
  max-width:1100px;
  margin:auto;
  background:#fff;
  padding:35px;
  border-radius:14px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:20px;
}

.printGrid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
  margin-top:20px;
}

input,select{
  width:100%;
  padding:10px;
}

button{
  width:100%;
  padding:14px;
  margin-top:20px;
  background:#000;
  color:#fff;
  border:none;
  cursor:pointer;
}

.section{
  margin-top:30px;
}

.red{
  color:#cc0000;
  font-weight:bold;
}

.green{
  color:#1b8f2a;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="wrapper">

<h1>2026 Screen Print Pricing</h1>

<div class="grid">
<div>
<label>Order Qty</label>
<input id="qty" type="number">
</div>

<div>
<label>Job Markup %</label>
<input id="markup" type="number" value="50">
</div>

<div>
<label>Shirt Cost</label>
<input id="shirtCost" type="number" value="4">
</div>

<div>
<label>Shirt Markup ($)</label>
<input id="shirtMarkup" type="number" value="2">
</div>
</div>

<div class="printGrid">
<div>
<label>Front Colors</label>
<select id="front"></select>
</div>

<div>
<label>Back Colors</label>
<select id="back"></select>
</div>

<div>
<label>Left Sleeve Colors</label>
<select id="left"></select>
</div>

<div>
<label>Right Sleeve Colors</label>
<select id="right"></select>
</div>
</div>

<button onclick="generate()">Generate Quote</button>

<div id="report"></div>

</div>

<script>

// Populate dropdowns
["front","back","left","right"].forEach(function(id){
  var select = document.getElementById(id);
  for(var i=0;i<=6;i++){
    var opt = document.createElement("option");
    opt.value = i;
    opt.textContent = i + " colors";
    select.appendChild(opt);
  }
});

function generate(){

var qty = parseFloat(document.getElementById("qty").value) || 0;
var markupPct = parseFloat(document.getElementById("markup").value) || 0;
var markup = markupPct / 100;
var shirtCost = parseFloat(document.getElementById("shirtCost").value) || 0;
var shirtMarkup = parseFloat(document.getElementById("shirtMarkup").value) || 0;

if(qty < 50){
  alert("Minimum order is 50");
  return;
}

var f = parseInt(document.getElementById("front").value);
var b = parseInt(document.getElementById("back").value);
var l = parseInt(document.getElementById("left").value);
var r = parseInt(document.getElementById("right").value);

var pricePerPrint = 2.6;
var screenFee = 22;

var frontCost = f * pricePerPrint * qty;
var backCost = b * pricePerPrint * qty;
var leftCost = l * pricePerPrint * qty;
var rightCost = r * pricePerPrint * qty;

var frontProfit = frontCost * markup;
var backProfit = backCost * markup;
var leftProfit = leftCost * markup;
var rightProfit = rightCost * markup;

var frontScreens = f * screenFee;
var backScreens = b * screenFee;
var leftScreens = l * screenFee;
var rightScreens = r * screenFee;

var totalPrintCost = frontCost + backCost + leftCost + rightCost;
var totalPrintProfit = frontProfit + backProfit + leftProfit + rightProfit;
var totalScreenFees = frontScreens + backScreens + leftScreens + rightScreens;

var garmentCost = shirtCost * qty;
var garmentSell = (shirtCost + shirtMarkup) * qty;
var garmentProfit = shirtMarkup * qty;

var jobCost = garmentCost + totalPrintCost;
var retail = jobCost * (1 + markup);
var pricePerShirt = retail / qty;
var totalProfit = retail - jobCost;

document.getElementById("report").innerHTML = `
<div class="section">
<h2>PRE-PRINTED GARMENTS</h2>
Blank Shirt Cost: <span class="red">$${shirtCost.toFixed(2)}</span><br>
Customer Shirt Price: <b>$${(shirtCost + shirtMarkup).toFixed(2)}</b><br>
Total Garment Cost: <span class="red">$${garmentCost.toFixed(2)}</span><br>
Garment Retail Total: <b>$${garmentSell.toFixed(2)}</b><br>
Garment Profit: <span class="green">$${garmentProfit.toFixed(2)}</span>
</div>

<div class="section">
<h2>PRINT PRODUCTION</h2>
Front (${f} colors): $${frontCost.toFixed(2)} | Profit: <span class="green">$${frontProfit.toFixed(2)}</span> | Screen Fees: $${frontScreens.toFixed(2)}<br>
Back (${b} colors): $${backCost.toFixed(2)} | Profit: <span class="green">$${backProfit.toFixed(2)}</span> | Screen Fees: $${backScreens.toFixed(2)}<br>
Left Sleeve (${l} colors): $${leftCost.toFixed(2)} | Profit: <span class="green">$${leftProfit.toFixed(2)}</span> | Screen Fees: $${leftScreens.toFixed(2)}<br>
Right Sleeve (${r} colors): $${rightCost.toFixed(2)} | Profit: <span class="green">$${rightProfit.toFixed(2)}</span> | Screen Fees: $${rightScreens.toFixed(2)}<br>
<br>
Total Screen Fees: <span class="red">$${totalScreenFees.toFixed(2)}</span><br>
Total Print Profit: <span class="green">$${totalPrintProfit.toFixed(2)}</span>
</div>

<div class="section">
<h2>CUSTOMER PRICING</h2>
Customer Price Per Shirt: <b>$${pricePerShirt.toFixed(2)}</b><br>
Customer Invoice Total: <b>$${retail.toFixed(2)}</b>
</div>

<div class="section">
<h2>JOB PROFIT</h2>
Total Profit: <span class="green">$${totalProfit.toFixed(2)}</span>
</div>

<br>
<button onclick="window.print()">Print Quote</button>
`;
}

</script>

</body>
</html>
