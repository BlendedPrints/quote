<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>2026 Screen Print Pricing</title>

<style>
body{font-family:Arial;background:#f4f4f4;padding:40px}
.wrapper{max-width:1100px;margin:auto;background:#fff;padding:35px;border-radius:14px}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:20px}
.printGrid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:20px}
.twoCol{display:grid;grid-template-columns:1fr 1fr;gap:40px}
input,select{width:100%;padding:10px;border:1px solid #ccc;border-radius:6px}
button{width:100%;padding:14px;margin-top:20px;background:#000;color:#fff;border:none}
.section{margin-top:30px}
.red{color:#cc0000;font-weight:bold}
.green{color:#1b8f2a;font-weight:bold}
.targetBox{background:#f7f7f7;padding:20px;border-radius:10px;border:1px solid #ddd}

@media print{body{padding:10px;font-size:11px}button{display:none}}
</style>
</head>

<body>

<div class="wrapper">
<h1>2026 Screen Print Pricing</h1>

<div class="grid">
<div><label>Order Qty</label><input id="qty" type="number"></div>
<div><label>Job Markup %</label><input id="markup" type="number" value="50"></div>
<div><label>Shirt Cost</label><input id="shirtCost" type="number" value="4"></div>
<div><label>Shirt Markup ($)</label><input id="shirtMarkup" type="number" value="2"></div>
</div>

<div class="printGrid">
<div><label>Front Colors</label><select id="front"></select></div>
<div><label>Back Colors</label><select id="back"></select></div>
<div><label>Left Sleeve Colors</label><select id="left"></select></div>
<div><label>Right Sleeve Colors</label><select id="right"></select></div>
</div>

<button onclick="generate()">Generate Quote</button>
<div id="report"></div>
</div>

<script>

// populate dropdowns
["front","back","left","right"].forEach(function(id){
 var s=document.getElementById(id);
 for(var i=0;i<=6;i++){
   var opt=document.createElement("option");
   opt.value=i;
   opt.textContent=i+" colors";
   s.appendChild(opt);
 }
});

var storedJobCost=0;
var storedQty=0;
var storedPricePerShirt=0;

function generate(){

var qty=parseFloat(document.getElementById("qty").value)||0;
var markupPct=parseFloat(document.getElementById("markup").value)||0;
var shirtCost=parseFloat(document.getElementById("shirtCost").value)||0;
var shirtMarkup=parseFloat(document.getElementById("shirtMarkup").value)||0;

if(qty<50){alert("Minimum order is 50");return;}

var f=parseInt(document.getElementById("front").value);
var b=parseInt(document.getElementById("back").value);
var l=parseInt(document.getElementById("left").value);
var r=parseInt(document.getElementById("right").value);

var markup=markupPct/100;
var pricePerPrint=2.6;
var screenFee=22;

// per location
var frontCost=f*pricePerPrint*qty;
var backCost=b*pricePerPrint*qty;
var leftCost=l*pricePerPrint*qty;
var rightCost=r*pricePerPrint*qty;

var frontCustomer=frontCost*(1+markup);
var backCustomer=backCost*(1+markup);
var leftCustomer=leftCost*(1+markup);
var rightCustomer=rightCost*(1+markup);

var frontProfit=frontCustomer-frontCost;
var backProfit=backCustomer-backCost;
var leftProfit=leftCustomer-leftCost;
var rightProfit=rightCustomer-rightCost;

var frontScreens=f*screenFee;
var backScreens=b*screenFee;
var leftScreens=l*screenFee;
var rightScreens=r*screenFee;

var totalPrintCost=frontCost+backCost+leftCost+rightCost;
var totalPrintCustomer=frontCustomer+backCustomer+leftCustomer+rightCustomer;
var totalPrintProfit=frontProfit+backProfit+leftProfit+rightProfit;
var totalScreenFees=frontScreens+backScreens+leftScreens+rightScreens;

// garments
var garmentCost=shirtCost*qty;
var garmentSell=(shirtCost+shirtMarkup)*qty;
var garmentProfit=shirtMarkup*qty;

// totals
var jobCost=garmentCost+totalPrintCost;
var retail=jobCost*(1+markup);
var pricePerShirt=retail/qty;
var totalProfit=retail-jobCost;

storedJobCost=jobCost;
storedQty=qty;
storedPricePerShirt=pricePerShirt;

var html="";
html+="<div class='section'><h2>PRINT PRODUCTION</h2>";
html+="Front ("+f+" colors) Cost: <span class='red'>$"+frontCost.toFixed(2)+"</span> | Customer: <b>$"+frontCustomer.toFixed(2)+"</b> | Profit: <span class='green'>$"+frontProfit.toFixed(2)+"</span> | Screens: <span class='red'>$"+frontScreens.toFixed(2)+"</span><br><br>";
html+="Back ("+b+" colors) Cost: <span class='red'>$"+backCost.toFixed(2)+"</span> | Customer: <b>$"+backCustomer.toFixed(2)+"</b> | Profit: <span class='green'>$"+backProfit.toFixed(2)+"</span> | Screens: <span class='red'>$"+backScreens.toFixed(2)+"</span><br><br>";
html+="Left Sleeve ("+l+" colors) Cost: <span class='red'>$"+leftCost.toFixed(2)+"</span> | Customer: <b>$"+leftCustomer.toFixed(2)+"</b> | Profit: <span class='green'>$"+leftProfit.toFixed(2)+"</span> | Screens: <span class='red'>$"+leftScreens.toFixed(2)+"</span><br><br>";
html+="Right Sleeve ("+r+" colors) Cost: <span class='red'>$"+rightCost.toFixed(2)+"</span> | Customer: <b>$"+rightCustomer.toFixed(2)+"</b> | Profit: <span class='green'>$"+rightProfit.toFixed(2)+"</span> | Screens: <span class='red'>$"+rightScreens.toFixed(2)+"</span><br></div>";

document.getElementById("report").innerHTML=html;
}

</script>
</body>
</html>
